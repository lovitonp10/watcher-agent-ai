name: Weekly Tech Watch Digest (Monday)

on:
  schedule:
    # Tous les lundis à 8h45 UTC (9h45 FR hiver, 10h45 FR été)
    - cron: '45 6 * * 1'  # 1 = Monday
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  send-weekly-digest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run weekly digest
      env:
        # LLM Provider - Use Groq (free tier: 7k requests/day)
        LLM_PROVIDER: groq
        LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
        LLM_MODEL: llama-3.3-70b-versatile

        # Email configuration
        EMAIL_ENABLED: true
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}

        # Keywords (Video Popularity)
        KEYWORDS: "Video Understanding,Multimodal AI,Vision-Language Models,VLM,Video Popularity,Social Media Algorithm,TikTok Algorithm,Instagram Algorithm,Video Virality,Engagement Prediction,Creator Economy,Content Recommendation,Explainable AI,XAI,SHAP,Attention Mechanism,Video Classification,Cross-Platform Analysis"

        # Data ingestion
        DAYS_TO_FETCH: 7
        MAX_RESULTS_PER_SOURCE: 20
      run: |
        python main.py digest --send --frequency weekly

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-logs
        path: |
          *.log
          data/
